<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Novel IF Reader</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <h1>Novel IF Reader</h1>
          <p>소설 원문 기반 인물, 장소, 사건, 상태 변화 분석과 검수</p>
        </div>
        <div class="topbar-actions" aria-label="문서 작업">
          <label class="sample-picker" for="sampleSelect">
            <span>샘플</span>
            <select id="sampleSelect">
              <option value="wings">날개 - 이상</option>
              <option value="gamja">감자 - 김동인</option>
            </select>
          </label>
          <button id="loadSampleBtn" type="button">샘플 불러오기</button>
          <input id="textFileInput" type="file" accept=".txt,text/plain" hidden>
          <button id="uploadTextBtn" type="button">TXT 업로드</button>
          <label class="analyzer-picker" for="analyzerMode">
            <span>분석 방식</span>
            <select id="analyzerMode">
              <option value="rule">규칙 분석</option>
              <option value="ollama">LLM Seed 분석</option>
            </select>
          </label>
          <label class="model-picker" for="ollamaModel">
            <span>모델</span>
            <select id="ollamaModel" aria-label="Ollama 모델 선택">
              <option value="qwen3.5:4b">qwen3.5:4b</option>
              <option value="gemma4:e4b">gemma4:e4b</option>
              <option value="gemma3:4b">gemma3:4b</option>
              <option value="qwen3:4b">qwen3:4b</option>
            </select>
          </label>
          <button id="generateSeedBtn" type="button">LLM Seed 생성</button>
          <button id="analyzeBtn" type="button" class="primary">선택 방식으로 분석</button>
          <button id="saveSnapshotBtn" type="button">분석 저장</button>
          <button id="loadSnapshotBtn" type="button">저장본 복원</button>
        </div>
      </header>

      <main class="workspace">
        <section class="reader-pane" aria-label="Reader">
          <div class="pane-header">
            <div>
              <h2>Reader</h2>
              <span id="readerStats">문서 없음</span>
            </div>
            <label class="toggle-row">
              <input id="spoilerToggle" type="checkbox" checked>
              <span>스포일러 차단</span>
            </label>
          </div>

          <textarea id="sourceText" spellcheck="false" aria-label="소설 원문 입력"></textarea>

          <div class="reader-controls">
            <label for="readerPosition">독서 위치</label>
            <input id="readerPosition" type="range" min="1" max="1" value="1">
            <output id="readerPositionLabel">1 / 1</output>
          </div>

          <div id="segmentList" class="segment-list" aria-label="문단 목록"></div>
        </section>

        <section class="analysis-pane" aria-label="Analysis">
          <nav class="tabs" aria-label="분석 보기">
            <button class="tab active" type="button" data-tab="map">Map</button>
            <button class="tab" type="button" data-tab="timeline">Timeline</button>
            <button class="tab" type="button" data-tab="characters">Characters</button>
            <button class="tab" type="button" data-tab="review">검수</button>
            <button class="tab" type="button" data-tab="export">Export</button>
          </nav>

          <div class="filterbar">
            <label>
              사건
              <select id="eventTypeFilter">
                <option value="all">전체</option>
                <option value="appearance">등장</option>
                <option value="movement">이동</option>
                <option value="conversation">대화</option>
                <option value="perception">인식</option>
                <option value="conflict">갈등</option>
                <option value="realization">깨달음</option>
                <option value="stasis">정체</option>
                <option value="symbolic">상징</option>
                <option value="background">배경</option>
              </select>
            </label>
            <label>
              검수
              <select id="statusFilter">
                <option value="active">활성</option>
                <option value="all">전체</option>
                <option value="suggested">제안</option>
                <option value="confirmed">확정</option>
                <option value="edited">수정</option>
                <option value="manual">수동</option>
                <option value="rejected">제외</option>
              </select>
            </label>
            <label>
              객체
              <select id="entityFilter">
                <option value="all">전체</option>
              </select>
            </label>
          </div>

          <section id="mapTab" class="tab-panel active" aria-label="관계 지도">
            <div class="map-layout">
              <div class="graph-frame">
                <div class="pane-header compact">
                  <div>
                    <h2>Graph</h2>
                    <span id="mapStats">0 nodes</span>
                  </div>
                  <button id="clearSelectionBtn" type="button">선택 해제</button>
                </div>
                <svg id="spaceGraph" viewBox="0 0 980 620" role="img" aria-label="인물 장소 사건 관계 그래프"></svg>
              </div>
              <aside class="inspector" aria-label="선택 객체 상세">
                <h2>Inspector</h2>
                <div id="inspectorBody" class="inspector-body"></div>
              </aside>
            </div>
          </section>

          <section id="timelineTab" class="tab-panel" aria-label="사건 타임라인">
            <div id="timelineList" class="timeline-list"></div>
          </section>

          <section id="charactersTab" class="tab-panel" aria-label="인물 상태">
            <div id="characterCards" class="character-cards"></div>
          </section>

          <section id="reviewTab" class="tab-panel" aria-label="검수">
            <div class="review-layout">
              <section class="source-review">
                <div class="pane-header compact">
                  <div>
                    <h2>원문 근거</h2>
                    <span id="reviewSourceStats">현재 문단</span>
                  </div>
                  <button id="addManualEventBtn" type="button">사건 추가</button>
                </div>
                <div id="reviewSource" class="review-source"></div>
              </section>
              <section class="review-queue">
                <div class="pane-header compact">
                  <div>
                    <h2>검수 목록</h2>
                    <span id="reviewStats">0개</span>
                  </div>
                  <button id="rebuildBtn" type="button">재계산</button>
                </div>
                <div id="reviewList" class="review-list"></div>
              </section>
            </div>
          </section>

          <section id="exportTab" class="tab-panel" aria-label="내보내기">
            <div class="export-toolbar">
              <button type="button" data-export-format="json" class="active">JSON</button>
              <button type="button" data-export-format="csv">CSV</button>
              <button type="button" data-export-format="markdown">Markdown</button>
              <button type="button" data-export-format="timelinejs">TimelineJS</button>
              <button type="button" data-export-format="graph">Graph</button>
              <button id="copyExportBtn" type="button">복사</button>
            </div>
            <textarea id="exportOutput" readonly aria-label="내보내기 결과"></textarea>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
